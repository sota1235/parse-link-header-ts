name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setting up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version

      - name: Get current version
        id: current-version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: next-version
        run: |
          CURRENT_VERSION="${{ steps.current-version.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "${{ inputs.release_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found. Generating changelog from all commits."
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "Generating changelog since $PREVIOUS_TAG"
            COMMITS=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Categorize commits
          FEATURES=""
          FIXES=""
          CHORES=""
          OTHERS=""

          while IFS= read -r line; do
            if echo "$line" | grep -qiE "^- feat"; then
              FEATURES="${FEATURES}${line}"$'\n'
            elif echo "$line" | grep -qiE "^- fix"; then
              FIXES="${FIXES}${line}"$'\n'
            elif echo "$line" | grep -qiE "^- (chore|ci|build|docs|style|refactor|perf|test)"; then
              CHORES="${CHORES}${line}"$'\n'
            else
              OTHERS="${OTHERS}${line}"$'\n'
            fi
          done <<< "$COMMITS"

          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## v${{ steps.next-version.outputs.version }}"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo ""
              echo "$FEATURES"
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo ""
              echo "$FIXES"
            fi

            if [ -n "$CHORES" ]; then
              echo "### Maintenance"
              echo ""
              echo "$CHORES"
            fi

            if [ -n "$OTHERS" ]; then
              echo "### Others"
              echo ""
              echo "$OTHERS"
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        run: npm version ${{ steps.next-version.outputs.version }} --no-git-tag-version

      - name: Update CHANGELOG.md
        run: |
          CHANGELOG_ENTRY=$(cat <<'ENTRY_EOF'
          ${{ steps.changelog.outputs.changelog }}
          ENTRY_EOF
          )

          if [ -f CHANGELOG.md ]; then
            # Prepend new entry after the first heading line
            if head -1 CHANGELOG.md | grep -q "^# "; then
              {
                head -1 CHANGELOG.md
                echo ""
                echo "$CHANGELOG_ENTRY"
                tail -n +2 CHANGELOG.md
              } > CHANGELOG.tmp.md
              mv CHANGELOG.tmp.md CHANGELOG.md
            else
              {
                echo "$CHANGELOG_ENTRY"
                echo ""
                cat CHANGELOG.md
              } > CHANGELOG.tmp.md
              mv CHANGELOG.tmp.md CHANGELOG.md
            fi
          else
            {
              echo "# Changelog"
              echo ""
              echo "$CHANGELOG_ENTRY"
            } > CHANGELOG.md
          fi

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT_VERSION="${{ steps.next-version.outputs.version }}"
          BRANCH_NAME="release/v${NEXT_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release v${NEXT_VERSION}"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "Release v${NEXT_VERSION}" \
            --body "$(cat <<PR_EOF
          ## Release v${NEXT_VERSION}

          This PR was automatically generated by the release workflow.

          ### Changes

          ${{ steps.changelog.outputs.changelog }}

          ---

          > After merging, the package will be automatically published to npm.
          PR_EOF
          )" \
            --base main \
            --head "$BRANCH_NAME"
