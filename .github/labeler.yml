skip-changelog:
  - changed-files:
      - all-globs-to-all-files:
          - '!src/**'
          - '!package.json'
          - '!package-lock.json'
          - '!tsconfig.json'
          - '!tsconfig.publish.json'
          - '!eslint.config.mjs'
          - '!prettier.config.js'
          - '!.gitignore'
          - '!.npmignore'
          - '!LICENSE'
